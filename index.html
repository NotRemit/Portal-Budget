<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Flow | Modern Budget Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
</head>

<body>
    <div class="app-container">
        <header class="glass-container">
            <div class="header-content">
                <div class="user-info">
                    <span class="greeting" id="current-month-display">March 2026</span>
                    <h1 class="username">Budget Master</h1>
                </div>
                <div class="header-actions" style="display: flex; gap: 10px;">
                    <a href="ledger.html" class="settings-btn" id="open-ledger"
                        style="color: white; text-decoration: none;">
                        <i data-lucide="users"></i>
                    </a>
                    <div class="settings-btn" id="open-settings">
                        <i data-lucide="settings"></i>
                    </div>
                </div>
            </div>
        </header>

        <section class="balance-section">
            <div class="balance-card glass-container gradient-bg">
                <p class="label">Total Balance</p>
                <h2 class="total-balance">₹0.00</h2>
                <div class="savings-badge">Daily Savings: <span id="savings-balance">₹0.00</span></div>
                <div class="balance-details">
                    <div class="detail income">
                        <i data-lucide="arrow-down-circle"></i>
                        <div class="text">
                            <span>Income</span>
                            <p id="total-income">₹0.00</p>
                        </div>
                    </div>
                    <div class="detail expense">
                        <i data-lucide="arrow-up-circle"></i>
                        <div class="text">
                            <span>Expense</span>
                            <p id="total-expense">₹0.00</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="gauge-section">
            <div class="glass-container chart-container">
                <div class="chart-header">
                    <h3>Budget Fuel Meter</h3>
                    <span id="budget-percentage">0%</span>
                </div>
                <div class="canvas-holder">
                    <canvas id="budgetGauge"></canvas>
                    <div class="gauge-center">
                        <span class="spent-label">Spent</span>
                        <span id="spent-amount">₹0</span>
                    </div>
                </div>
                <div class="budget-status">
                    <span>Limit: <strong id="display-limit">₹0</strong></span>
                </div>
            </div>
        </section>

        <section class="gauge-section">
            <div class="glass-container chart-container">
                <div class="chart-header">
                    <h3>Category Breakdown</h3>
                </div>
                <div class="canvas-holder">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </section>

        <section class="transactions-section">
            <div class="section-header">
                <h3>Recent Transactions</h3>
                <button class="view-history" id="view-history">History</button>
            </div>
            <div id="transaction-list" class="transaction-list">
                <div class="empty-state">
                    <i data-lucide="database"></i>
                    <p>No transactions yet</p>
                </div>
            </div>
        </section>

        <div class="fab-container">
            <div class="action-button expense-btn" id="add-expense-btn">
                <i data-lucide="minus"></i>
            </div>
            <div class="action-button income-btn" id="add-income-btn">
                <i data-lucide="plus"></i>
            </div>
        </div>

        <!-- Add Transaction Modal -->
        <div id="transaction-modal" class="modal">
            <div class="modal-content glass-container animate-slide-up">
                <div class="modal-header">
                    <h3 id="modal-title">Add Transaction</h3>
                    <span class="close-modal" style="cursor: pointer;"><i data-lucide="x"></i></span>
                </div>
                <form id="transaction-form">
                    <div class="input-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" placeholder="0.00" required step="0.01">
                    </div>
                    <div class="input-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" placeholder="What's this for?" required>
                    </div>
                    <div class="input-group" style="display: none;">
                        <label for="type">Type</label>
                        <select id="type" required>
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="food">Food & Drinks</option>
                            <option value="shopping">Shopping</option>
                            <option value="transport">Transportation</option>
                            <option value="bills">Bills & Utilities</option>
                            <option value="entertainment">Entertainment</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="input-group" id="source-group" style="display: none;">
                        <label for="source">Source</label>
                        <select id="source">
                            <option value="account">Main Balance</option>
                            <option value="savings">Daily Savings Allowance</option>
                        </select>
                    </div>
                    <button type="submit" class="submit-btn gradient-bg">Save Transaction</button>
                    <button type="button" id="delete-transaction-btn" class="danger-btn" style="display: none;">Delete
                        Transaction</button>
                </form>
            </div>
        </div>

        <!-- History Modal -->
        <div id="history-modal" class="modal">
            <div class="modal-content glass-container animate-slide-up" style="max-height: 85vh; overflow-y: auto;">
                <div class="modal-header">
                    <h3>Transaction History</h3>
                    <span class="close-history" style="cursor: pointer;"><i data-lucide="x"></i></span>
                </div>
                <div id="history-list" class="transaction-list">
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal">
            <div class="modal-content glass-container animate-slide-up">
                <div class="modal-header">
                    <h3>App Settings</h3>
                    <span class="close-settings" style="cursor: pointer;"><i data-lucide="x"></i></span>
                </div>
                <div class="settings-body">
                    <div class="input-group">
                        <label for="initial-balance">Initial Bank Balance (₹)</label>
                        <input type="number" id="initial-balance" placeholder="Enter initial balance">
                        <button id="save-initial-balance" class="submit-btn gradient-bg"
                            style="margin-top: 10px;">Update Balance</button>
                    </div>
                    <hr class="separator">
                    <div class="input-group">
                        <label for="monthly-budget">Set Monthly Budget (₹)</label>
                        <input type="number" id="monthly-budget" placeholder="Enter limit">
                        <button id="save-budget" class="submit-btn gradient-bg" style="margin-top: 10px;">Update
                            Budget</button>
                    </div>
                    <hr class="separator">
                    <button id="reset-month-manual" class="danger-btn">Reset Month for Testing</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        window.addEventListener('load', () => {
            lucide.createIcons();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js');
            }
        });
    </script>
</body>

</html>
